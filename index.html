<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>CyberTech RH - HR-HUB PLUS</title>
    <meta name="description" content="Sistema de Gestão de RH CyberTech" />
    <meta name="author" content="ChrysthiannoSanttos" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0ea5e9" />
    <link rel="apple-touch-icon" href="/logo-cybertech.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="CyberTech RH - HR-HUB PLUS" />
    <meta property="og:description" content="Sistema de Gestão de RH Moderno" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo-cybertech.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@CyberTech" />
    <meta name="twitter:image" content="/logo-cybertech.png" />

    <script>
      (function() {
        try {
          const urlParams = new URLSearchParams(window.location.search);
          const tenant = urlParams.get('t') || localStorage.getItem('last_tenant_slug');
          
          if (tenant) {
            // Oculta o background padrão imediatamente se houver um tenant detectado
            document.documentElement.style.setProperty('--tenant-bg', 'none');
            
            // Tenta carregar do cache para exibição instantânea
            const cached = localStorage.getItem('branding_' + tenant);
            if (cached) {
              const branding = JSON.parse(cached);
              if (branding.background_url) {
                document.documentElement.style.setProperty('--tenant-bg', 'url("' + branding.background_url + '")');
              }
              if (branding.primary_color) {
                document.documentElement.style.setProperty('--primary-color', branding.primary_color);
              }
            }
          }
        } catch (e) {
          console.error('Branding pre-loader error:', e);
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
